services:
  - type: web
    name: autocrud-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
